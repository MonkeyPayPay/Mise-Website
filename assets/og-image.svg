  <text x="90" y="330" font-family="Georgia, serif" font-size="78" font-weight="600" fill="#faf6ef">Everything in its place.</text>
  <text x="90" y="410" font-family="Helvetica, Arial, sans-serif" font-size="34" fill="#c9bda6">The all-in-one restaurant operating system.</text>
  <text x="90" y="458" font-family="Helvetica, Arial, sans-serif" font-size="34" fill="#c9bda6">One platform. One login. One source of truth.</text>

  <text x="90" y="560" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#d1852f" font-weight="700" letter-spacing="2">MISE-HOSPITALITY.COM</text>
