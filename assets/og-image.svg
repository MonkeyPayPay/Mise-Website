<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1a17"/>
      <stop offset="1" stop-color="#2a2620"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="120" r="360" fill="#d1852f" opacity="0.10"/>
  <circle cx="150" cy="560" r="280" fill="#5b6b52" opacity="0.10"/>

  <g transform="translate(90,150)">
    <circle cx="34" cy="34" r="30" fill="none" stroke="#d1852f" stroke-width="4"/>
